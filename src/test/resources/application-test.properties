# Configuração de Banco de Dados H2 (Em Memória) para Testes
# Isso permite rodar 'mvn package' sem VPN/Internet e sem sujar o banco Azure

spring.datasource.url=jdbc:h2:mem:bioplanta-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuração JPA / Hibernate para H2
# 'create-drop': Cria as tabelas do zero ao iniciar o teste e APAGA tudo ao terminar
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Garante que scripts SQL de dados rodem se existirem
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Ajuste CORS para testes
cors.allowed.origins=*