# Datasource - SQL Server (mesmas variáveis do perfil dev/local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=bioplanta;encrypt=false;trustServerCertificate=true}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:sa}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dev}
spring.jpa.defer-datasource-initialization=false

spring.sql.init.mode=never
spring.flyway.enabled=false

# Suprime o warning do Spring Security sobre senha gerada automaticamente
spring.security.user.name=test
spring.security.user.password=test

# CORS
cors.allowed.origins=*