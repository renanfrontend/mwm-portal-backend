# Banco de Dados HML
spring.datasource.url=jdbc:sqlserver://dgrssqlsbioplanta.database.windows.net:1433;databaseName=bioplanta;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bioplantausr}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:b10pl@nt@$10}


admin.hash=$2a$10$dummyhashparatestes
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
cors.allowed.origins=http://localhost:5173,http://localhost:5175,http://localhost:8080
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
springdoc.swagger-ui.enabled=true

# Define o schema padrão do Hibernate via variável de ambiente DB_SCHEMA (default: dbo)
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dbo}