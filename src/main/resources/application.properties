spring.application.name=bioplanta

# DESATIVA inicializacao de scripts SQL (data.sql)
# SEGURANÇA MÁXIMA: Nunca criar ou dropar tabelas automaticamente
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Configuração JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# GARANTE que o Hibernate NAO altere a estrutura do banco
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false

# Define o schema padrão do Hibernate via variável de ambiente DB_SCHEMA (default: dbo)
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dbo}

# Disable DevTools defaults to ensure ddl-auto=none is respected
spring.devtools.add-properties=false

# Porta do Servidor (Azure define a porta via variável PORT, local usa 8080)
server.port=${PORT:8080}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5175,http://localhost:5173,*}
