# Configuração de Banco de Dados H2 (Arquivo Local) para uso LOCAL
# Dados são persistidos em arquivo local

# Datasource - H2 com arquivo local (dados persistem entre execuções)
# MODE=MSSQLServer fornece compatibilidade básica com SQL Server
spring.datasource.url=jdbc:h2:file:./h2db/bioplanta;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' cria/altera o schema sem dropar os dados (dados persistem)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
# Força Hibernate a usar sintaxe SQL correta para H2 e quoted identifiers
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Desabilita timestamp(6) que não é suportado por H2
spring.jpa.properties.hibernate.dialect.h2.max_timestamp_precision=6

# Console do H2 (Acesse em http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Inicialização de dados - DESABILITADA para evitar erros de codificação
spring.sql.init.mode=never
# spring.sql.init.data-locations=classpath:data-h2.sql
spring.jpa.defer-datasource-initialization=true

# Desabilita Flyway para H2 local (não temos autorização para SQL Server)
spring.flyway.enabled=false

# CORS Liberado localmente
cors.allowed.origins=*

# Admin Authentication
admin.hash=pgrsbp_secret_2026

# Swagger/OpenAPI - Habilitado em local
springdoc.swagger-ui.enabled=true
