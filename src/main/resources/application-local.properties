# Configuração para uso LOCAL com SQL Server via Docker
# Pré-requisito: SQL Server rodando em Docker na porta 1433
#
# Variáveis de ambiente utilizadas (com fallback padrão):
#   LOCAL_DB_USERNAME  (padrão: sa)
#   LOCAL_DB_PASSWORD  (padrão: sa)
#   DB_SCHEMA          (padrão: dev)

# Datasource - SQL Server local (Docker)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=bioplanta;encrypt=false;trustServerCertificate=true
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${LOCAL_DB_USERNAME:sa}
spring.datasource.password=${LOCAL_DB_PASSWORD:sa}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dev}

# Inicialização de dados - Desabilitada
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Flyway - Desabilitado
spring.flyway.enabled=false

# CORS Liberado localmente
cors.allowed.origins=*

# Admin Authentication
admin.hash=pgrsbp_secret_2026

# Swagger/OpenAPI - Habilitado em local
springdoc.swagger-ui.enabled=true
