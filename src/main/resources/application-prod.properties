# ============================================================================
# CONFIGURAÇÃO DE PRODUÇÃO - application-prod.properties
# ============================================================================
# Usado quando: SPRING_PROFILES_ACTIVE=prod
# Equivalente ao antigo: application-azure.properties
# 
# IMPORTANTE: Variáveis sensíveis (username, password, admin.hash) são 
# gerenciadas pelo Azure Container App Secrets/Environment Variables
# Este arquivo contém apenas as configurações estruturais e de comportamento
# ============================================================================

# Admin Authentication
admin.hash=${ADMIN_HASH:pgrsbp_secret_2026}

# SQL Init - NUNCA executar scripts SQL automaticamente em produção
spring.sql.init.mode=NEVER
spring.jpa.defer-datasource-initialization=false

# Datasource - Conecta ao SQL Server do Azure
# URL, USERNAME e PASSWORD virão como variáveis de ambiente do Container App
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://prgsazsqldb.database.windows.net:1433;databaseName=bioplanta;encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30;quotedIdentifier=OFF;}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.microsoft.sqlserver.jdbc.SQLServerDriver}


# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
# SEGURANÇA MÁXIMA: Nunca criar ou dropar tabelas automaticamente
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.show-sql=false
# Impede o Hibernate de consultar o banco 'master' para metadata (Azure SQL restringe o acesso)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# CORS - Configurar CORS_ALLOWED_ORIGINS no Azure Container App com o domínio real do frontend
# Exemplo: https://app.bioplanta.com.br,https://bioplanta.azurewebsites.net
# Fallback * permite qualquer origem enquanto CORS_ALLOWED_ORIGINS não estiver definido
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:*}

# Swagger/OpenAPI - Habilitado

# Define o schema padrão do Hibernate via variável de ambiente DB_SCHEMA (default: dbo)
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dbo}
springdoc.swagger-ui.enabled=true
