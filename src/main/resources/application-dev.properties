# ============================================================================
# CONFIGURAÇÃO DE DESENVOLVIMENTO - application-dev.properties
# ============================================================================
# Usado quando: SPRING_PROFILES_ACTIVE=dev
# Banco de Dados: SQL Server Azure (schema dev)
# Conexão injetada via variáveis de ambiente no Azure Container App
# ============================================================================

# Datasource - SQL Server (variáveis injetadas pelo deploy-dev.sh)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:dev}
spring.jpa.defer-datasource-initialization=false

# Inicialização de dados - Desabilitada
spring.sql.init.mode=never

# Flyway - Desabilitado
spring.flyway.enabled=false

# CORS
cors.allowed.origins=*

# Admin Authentication
admin.hash=${ADMIN_HASH}

# Swagger/OpenAPI - Habilitado em dev
springdoc.swagger-ui.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.mwm=DEBUG
