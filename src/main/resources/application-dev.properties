# ============================================================================
# CONFIGURAÇÃO DE DESENVOLVIMENTO - application-dev.properties
# ============================================================================
# Usado quando: SPRING_PROFILES_ACTIVE=dev
# Equivalente ao: application-local.properties
# 
# Banco de Dados H2 em memória (sem persistência entre restarts)
# Útil para testes rápidos e desenvolvimento sem dependência de BD real
# ============================================================================

# Datasource - H2 em memória
# MODE=MSSQLServer fornece compatibilidade básica com SQL Server
spring.datasource.url=jdbc:h2:mem:bioplanta-dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MSSQLServer
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'create' cria as tabelas do zero a cada startup
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# H2 Console - Acesse em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Inicialização de dados para desenvolvimento
spring.sql.init.mode=never
# spring.sql.init.data-locations=classpath:data-h2.sql
spring.jpa.defer-datasource-initialization=true

# CORS Liberado localmente para todo o localhost
cors.allowed.origins=*

# Admin Authentication
admin.hash=pgrsbp_secret_2026

# Swagger/OpenAPI - Habilitado em dev
springdoc.swagger-ui.enabled=true

# Logging - Verbose para debug
logging.level.root=INFO
logging.level.com.mwm=DEBUG
